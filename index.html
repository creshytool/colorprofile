<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Color Converter | Creshy Studio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
#color-studio{
    --blue:#0984e3;
    font-family:Inter, sans-serif;
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* HEADER */
.studio-top{
    background:#111;
    color:#fff;
    padding:12px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LAYOUT */
.workspace{
    display:grid;
    grid-template-columns:300px 1fr;
    min-height:650px;
}

/* TOOLBAR */
.toolbar{
    background:#f5f6fa;
    padding:15px;
    border-right:1px solid #ddd;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.upload-area{
    border:2px dashed #bbb;
    padding:20px;
    text-align:center;
    cursor:pointer;
    border-radius:10px;
    background:#fff;
}
.upload-area:hover{border-color:var(--blue)}

/* ================= BUTTON FIX SYSTEM ================= */

.btn{
    padding:10px;
    border:1px solid #dcdde1;
    background:#fff;
    cursor:pointer;
    border-radius:8px;
    font-size:13px;
    transition:0.2s;
    color:#2f3640;
}

.btn:hover{
    border-color:#0984e3;
    color:#0984e3;
    transform:translateY(-1px);
}

.btn.primary{
    background:#0984e3;
    color:#fff;
    border:none;
}
.btn.primary:hover{
    background:#0769b5;
}

.mode-btn{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#fff;
    border:1px solid #dcdde1;
    color:#2f3640;
    border-radius:8px;
    cursor:pointer;
    text-align:left;
    font-size:13px;
    transition:0.2s;
}
.mode-btn:hover{
    border-color:#0984e3;
    color:#0984e3;
}
.mode-btn.active{
    background:#0984e3;
    color:#fff;
    border-color:#0984e3;
}

/* VIEW */
.viewport{
    background:#f1f2f6;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    flex-direction:column;
}

.canvas-box{
    background:#fff;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    position:relative;
}

/* CMYK EFFECT */
.cmyk canvas{
    filter:saturate(0.8) contrast(1.1);
}

.warn{
    position:absolute;
    bottom:15px;
    right:15px;
    background:#ffeaa7;
    color:#d35400;
    padding:6px 10px;
    font-size:11px;
    display:none;
    border-radius:6px;
}

/* CONTROLS */
.controls{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

.controls .btn{
    min-width:45px;
    text-align:center;
}

/* MOBILE */
@media(max-width:900px){
    .workspace{grid-template-columns:1fr}
}
</style>




<div id="color-studio">

<div class="studio-top">
    <div><b style="color:#0984e3">PDF Color Profile Converter</b></div>
    <div id="status">Creshy Tools</div>
</div>

<div class="workspace">

<!-- TOOLBAR -->
<div class="toolbar">

<div class="upload-area" id="dropZone">
📄<br><b>Upload PDF</b>
<input type="file" id="file" hidden="" accept="application/pdf">
</div>

<button class="btn mode-btn active" id="rgbBtn">RGB Mode</button>
<button class="btn mode-btn" id="cmykBtn">CMYK Mode</button>

<div class="controls">
<button class="btn" id="prev">Prev</button>
<button class="btn" id="next">Next</button>
<input class="btn" id="pageNo" type="number" min="1" value="1" style="width:60px">
</div>

<div class="controls">
<button class="btn" id="zoomIn">+</button>
<button class="btn" id="zoomOut">-</button>
</div>

<button class="btn primary" id="png">Download PNG</button>
<button class="btn primary" id="pdf">Download PDF</button>

</div>

<!-- VIEW -->
<div class="viewport" id="viewport">

<div class="canvas-box" id="box">
<canvas id="canvas"></canvas>
<div class="warn" id="warn">OUT OF GAMUT</div>
</div>

</div>

</div>
</div>

<script>
(function(){

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

let pdf=null,page=1,scale=1.3,mode="rgb";

const $=id=>document.getElementById(id);

const canvas=$("canvas");
const ctx=canvas.getContext("2d");

function render(){
if(!pdf) return;

pdf.getPage(page).then(p=>{
const vp=p.getViewport({scale});
canvas.width=vp.width;
canvas.height=vp.height;

p.render({canvasContext:ctx,viewport:vp});

$("status").innerText=`PAGE ${page}/${pdf.numPages}`;
$("pageNo").value=page;
});
}

$("file").addEventListener("change",async e=>{
const file=e.target.files[0];
if(!file) return;

const r=new FileReader();
r.onload=async function(){
pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
page=1;
render();
}
r.readAsArrayBuffer(file);
});

$("dropZone").onclick=()=>$("file").click();

$("prev").onclick=()=>{if(page>1){page--;render();}}
$("next").onclick=()=>{if(pdf && page<pdf.numPages){page++;render();}}

$("pageNo").onchange=e=>{
page=parseInt(e.target.value);
render();
}

$("zoomIn").onclick=()=>{scale+=0.2;render();}
$("zoomOut").onclick=()=>{scale=Math.max(0.6,scale-0.2);render();}

$("rgbBtn").onclick=()=>{
mode="rgb";
$("box").classList.remove("cmyk");
$("rgbBtn").classList.add("active");
$("cmykBtn").classList.remove("active");
}

$("cmykBtn").onclick=()=>{
mode="cmyk";
$("box").classList.add("cmyk");
$("cmykBtn").classList.add("active");
$("rgbBtn").classList.remove("active");
}

$("png").onclick=()=>{
const a=document.createElement("a");
a.download="page.png";
a.href=canvas.toDataURL();
a.click();
}

$("pdf").onclick=()=>{
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.addImage(canvas.toDataURL("image/png"),"PNG",10,10,180,160);
doc.save("page.pdf");
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight") $("next").click();
if(e.key==="ArrowLeft") $("prev").click();
});

})();
</script>
